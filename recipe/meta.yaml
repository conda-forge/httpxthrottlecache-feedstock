{% set name = "httpxthrottlecache" %}
{% set version = "0.3.5" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/httpxthrottlecache-{{ version }}.tar.gz
  sha256: eda3611b9fcbf1e2046191695fb92855f73fc333a7c040d3660aac11b9a60c1f

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - hatchling
    - uv-dynamic-versioning
    - pip
  run:
    - python >={{ python_min }}
    - aiofiles >=24.1.0
    - filelock >=3.18.0
    - httpx >=0.28.1
    - pyrate-limiter >=3.9.0

test:
  imports:
    - httpxthrottlecache
  commands:
    - pip check
  requires:
    - python {{ python_min }}
    - pip

about:
  home: https://github.com/paultiq/httpxthrottlecache
  summary: Rate Limiting and Caching HTTPX Client
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - faceprint
